name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate skill metadata
        run: python .github/scripts/quick_validate.py fengshui-master

      - name: Audit repository consistency
        run: python .github/scripts/audit_repository.py

      - name: Validate portable evaluation suite
        run: python examples/validate_portable_evaluation.py

      - name: Validate portable manifest
        run: python examples/validate_portable_manifest.py

      - name: Validate reference catalog
        run: python examples/validate_reference_catalog.py

      - name: Validate tool catalog
        run: python examples/validate_tool_catalog.py

      - name: Validate response contract
        run: python examples/validate_response_contract.py

      - name: Validate capability matrix
        run: python examples/validate_capability_matrix.py

      - name: Validate source quality policy
        run: python examples/validate_source_quality_policy.py

      - name: Validate adversarial evaluation suite
        run: python examples/validate_adversarial_evaluation.py

      - name: Validate intake contracts
        run: python examples/validate_intake_contracts.py

      - name: Validate golden responses
        run: python examples/validate_golden_responses.py

      - name: Validate universal domain protocol
        run: python examples/validate_universal_domain_protocol.py

      - name: Validate external calculation contracts
        run: python examples/validate_external_calculation_contracts.py

      - name: Validate contribution quality gates
        run: python examples/validate_contribution_quality_gates.py

      - name: Smoke test domain router
        run: python fengshui-master/scripts/domain_router.py "Should I buy this stock next month?" --pretty

      - name: Smoke test method selector
        run: python fengshui-master/scripts/method_selector.py "Use Xuan Kong flying stars for this Period 9 renovation" --pretty

      - name: Smoke test consultation brief
        run: python fengshui-master/scripts/create_brief.py "Use feng shui to improve my sleep and stress" --pretty

      - name: Smoke test report generator
        run: python fengshui-master/scripts/generate_report.py "Use feng shui to review this product onboarding flow"

      - name: Smoke test bagua map helper
        run: python fengshui-master/scripts/bagua_map.py --direction southeast --pretty

      - name: Smoke test moon phase helper
        run: python fengshui-master/scripts/moon_phase.py 2024-04-08 --pretty

      - name: Smoke test solar terms helper
        run: python fengshui-master/scripts/solar_terms.py 2026-02-04 --pretty
