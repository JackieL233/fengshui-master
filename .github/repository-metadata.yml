repository:
  name: fengshui-master
  visibility: public
  default_branch: main
  description: "Portable AI skill and Codex-compatible capability pack for traditional Chinese feng shui, wuxing, auspiciousness, spatial analysis, and cross-domain symbolic decision support."
  description_zh: "通用 AI Skill 与兼容 Codex 的风水智能体能力包，覆盖传统风水、五行、吉凶、空间分析与跨领域象义决策支持。"
  homepage: ""
  topics:
    - feng-shui
    - fengshui
    - wuxing
    - five-elements
    - bagua
    - chinese-metaphysics
    - traditional-chinese-culture
    - ai-skill
    - agent-skill
    - portable-skill
    - codex-skill
    - symbolic-analysis
    - spatial-analysis
    - cultural-analysis
    - auspiciousness
release_checks:
  local:
    - "python -m unittest discover -s tests"
    - "python .github/scripts/quick_validate.py fengshui-master"
    - "python .github/scripts/audit_repository.py"
  push:
    - "git remote add origin <repository-url>"
    - "git push -u origin master:main"
