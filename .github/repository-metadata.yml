repository:
  name: fengshui-master
  visibility: public
  default_branch: main
  description: "Comprehensive Codex skill for traditional Chinese feng shui, wuxing, auspiciousness, and cross-domain symbolic analysis."
  description_zh: "全面的 Codex 风水 Skill，覆盖传统风水、五行、吉凶、空间分析与跨领域象义分析。"
  homepage: ""
  topics:
    - feng-shui
    - fengshui
    - wuxing
    - five-elements
    - bagua
    - chinese-metaphysics
    - traditional-chinese-culture
    - codex-skill
    - symbolic-analysis
    - spatial-analysis
    - cultural-analysis
    - auspiciousness
release_checks:
  local:
    - "python -m unittest discover -s tests"
    - "python .github/scripts/quick_validate.py fengshui-master"
    - "python .github/scripts/audit_repository.py"
  push:
    - "git remote add origin <repository-url>"
    - "git push -u origin master:main"
